<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Kidding Me?</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }

        /* 3D Flip Utilities */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Subtle dotted pattern for the front of the cards for a premium feel */
        .card-front {
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 16px 16px;
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen py-12 px-6" x-data="kanjiApp()">
    <div class="max-w-7xl mx-auto">

        <!-- Header -->
        <header class="text-center mb-20 mt-8">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-slate-900 mb-6 drop-shadow-sm">
                Kanji Kidding Me?
            </h1>
            <p class="text-xl md:text-2xl text-slate-600 font-medium max-w-2xl mx-auto">
                Because learning character etymology shouldn't require a history degree.
            </p>
        </header>

        <!-- Search Bar -->
        <div class="max-w-2xl mx-auto mb-16 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-6 w-6 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text" x-model="searchQuery" placeholder="Search by kanji, meaning, or reading..."
                class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-200 bg-white placeholder-slate-400 focus:outline-none focus:border-black focus:ring-4 focus:ring-slate-200 transition-all text-lg shadow-sm">

            <!-- Bookmark Toggle & Results Counter Row -->
            <div class="absolute -bottom-10 left-0 right-0 flex justify-between items-center text-sm font-medium">
                <button @click="showBookmarksOnly = !showBookmarksOnly"
                    :class="showBookmarksOnly ? 'text-black bg-slate-100 border-slate-300' : 'text-slate-500 hover:bg-slate-50 border-transparent'"
                    class="flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-colors outline-none focus:ring-2 focus:ring-slate-200">
                    <svg class="w-4 h-4 transition-colors"
                        :class="showBookmarksOnly ? 'fill-black' : 'fill-none stroke-current'" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                    Bookmarked (<span x-text="kanjis.filter(k => k.bookmarked).length"></span>)
                </button>

                <div class="text-slate-500" x-show="searchQuery !== '' || showBookmarksOnly" x-transition>
                    Showing <span x-text="filteredKanjis.length"></span> results
                </div>
            </div>
        </div>

        <!-- Quiz Section -->
        <div class="max-w-2xl mx-auto mb-16 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm text-center">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Mini Quiz</h2>
            <div x-show="!quiz.active">
                <button @click="startQuiz()"
                    class="bg-black text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors">Start
                    Quiz</button>
            </div>
            <div x-show="quiz.active">
                <div class="text-7xl font-sans mb-6 text-slate-800"
                    x-text="quiz.questions[quiz.currentIndex] ? quiz.questions[quiz.currentIndex].kanji : ''">
                </div>
                <input x-ref="quizInput" type="text" x-model="quiz.answer" @keyup.enter="handleEnter()"
                    :readonly="quiz.message !== ''" placeholder="Type meaning in English..."
                    class="w-full max-w-xs border-2 border-slate-200 px-4 py-3 rounded-xl text-center focus:outline-none focus:border-black mb-4 text-lg read-only:bg-slate-50 read-only:text-slate-500">
                <div class="flex justify-center gap-4">
                    <button @click="handleEnter()"
                        class="bg-black text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors"
                        x-text="quiz.message ? 'Next Question' : 'Submit'"></button>
                </div>
                <div class="mt-6 text-2xl font-bold"
                    :class="quiz.message === 'Correct!' ? 'text-green-500' : 'text-red-500'" x-text="quiz.message">
                </div>
                <div class="mt-2 text-lg text-slate-600 font-medium"
                    x-show="quiz.message && quiz.message !== 'Correct!'">
                    Answer: <span x-text="quiz.questions[quiz.currentIndex]?.answers.join(', ')"></span>
                </div>
            </div>
        </div>

        <!-- Flashcard Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-8">
            <template x-for="kanji in filteredKanjis" :key="kanji.kanji">
                <div class="relative w-full h-80 group perspective-1000" @click="kanji.flipped = !kanji.flipped">
                    <!-- The Card Inner -->
                    <div class="w-full h-full transition-transform duration-700 transform-style-3d cursor-pointer shadow-xl rounded-3xl"
                        :class="kanji.flipped ? 'rotate-y-180' : ''">

                        <!-- Front Face -->
                        <div
                            class="absolute inset-0 w-full h-full backface-hidden card-front bg-white border border-slate-200 rounded-3xl flex flex-col items-center justify-center transition-colors hover:border-black group-hover:shadow-2xl">
                            <!-- Bookmark Star -->
                            <button @click.prevent.stop="toggleBookmark(kanji)"
                                class="absolute top-4 right-4 p-2 rounded-full hover:bg-slate-100 transition-colors z-10 group/btn">
                                <svg class="w-7 h-7 transition-all duration-300 group-hover/btn:scale-110"
                                    :class="kanji.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-200 fill-none stroke-current'"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                            <span
                                class="text-9xl mb-4 font-semibold text-slate-800 drop-shadow-sm transition-transform duration-300 group-hover:scale-110"
                                x-text="kanji.kanji"></span>
                            <span
                                class="text-slate-400 font-bold tracking-widest uppercase text-xs opacity-0 transition-opacity duration-300 group-hover:opacity-100">Click
                                to flip</span>
                        </div>

                        <!-- Back Face -->
                        <div
                            class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-white text-slate-800 rounded-3xl p-8 flex flex-col justify-center items-center text-center shadow-2xl border border-slate-200">
                            <!-- Bookmark Star -->
                            <button @click.prevent.stop="toggleBookmark(kanji)"
                                class="absolute top-4 right-4 p-2 rounded-full hover:bg-slate-100 transition-colors z-10 group/btn">
                                <svg class="w-7 h-7 transition-all duration-300 group-hover/btn:scale-110"
                                    :class="kanji.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-200 fill-none stroke-current'"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                            <!-- Meaning -->
                            <h3 class="text-4xl font-bold text-black mb-2" x-text="kanji.meaning"></h3>
                            <!-- Reading -->
                            <p class="text-lg text-black font-mono mb-6 bg-slate-100 py-1 px-4 rounded-full border border-slate-300"
                                x-text="kanji.reading"></p>

                            <!-- Humorous Origin Story -->
                            <div class="relative mt-2">
                                <span class="absolute -top-6 -left-3 text-5xl text-slate-200 font-serif">"</span>
                                <p class="text-[1.05rem] text-slate-600 italic relative z-10 leading-relaxed"
                                    x-text="kanji.origin_story"></p>
                                <span class="absolute -bottom-8 -right-3 text-5xl text-slate-200 font-serif">"</span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Footer -->
        <footer class="mt-24 text-center text-slate-400 text-sm font-medium">
            <p>Built with immense sarcasm, zero build tools, and strictly N5 vocabulary.</p>
        </footer>
    </div>

    <script>

                    { kanji: '駅', meaning: 'Station', reading: 'eki', origin_story: 'A horse (馬) looking at a ruler (尺) measuring the delays.', flipped: false },
                    { kanji: '道', meaning: 'Road', reading: 'michi', origin_story: 'A head (首) rolling along a path. Medieval times were rough.', flipped: false },
                    { kanji: '社', meaning: 'Company', reading: 'sha / yashiro', origin_story: 'Pouring your energy into the dirt for corporate gods.', flipped: false },
                    { kanji: '国', meaning: 'Country', reading: 'kuni', origin_story: 'A king (王) trapped in a box (囗) calling the shots.', flipped: false },
                    { kanji: '白', meaning: 'White', reading: 'shiro', origin_story: 'A sun (日) with a single grey hair on top.', flipped: false },
                    { kanji: '黒', meaning: 'Black', reading: 'kuro', origin_story: 'A computer monitor (里) sitting over a roaring fire (灬). My setup rendering a 4k video.', flipped: false },
                    { kanji: '赤', meaning: 'Red', reading: 'aka', origin_story: 'Someone wearing a giant backpack standing over a campfire (灬).', flipped: false },
                    { kanji: '青', meaning: 'Blue', reading: 'ao', origin_story: 'The moon (月) rising over a polluted factory.', flipped: false },
                    { kanji: '入', meaning: 'Enter', reading: 'iru / hairu', origin_story: 'An inverted "V" attempting to blend in with the normal letters.', flipped: false },
                    { kanji: '出', meaning: 'Exit', reading: 'deru', origin_story: 'Two mountain peaks stacked uncomfortably on top of each other.', flipped: false },
                    { kanji: '友', meaning: 'Friend', reading: 'tomo', origin_story: 'Two hands reaching out to borrow money.', flipped: false },
                    { kanji: '校', meaning: 'School', reading: 'kou', origin_story: 'A tree (木) next to a building where creativity goes to die (交).', flipped: false },
                    { kanji: '勉', meaning: 'Study', reading: 'ben', origin_story: 'Using force (力) to give a rabbit a weird massage.', flipped: false },
                    { kanji: '母', meaning: 'Mother', reading: 'haha', origin_story: 'Two weird squares with dots in them. Use your imagination.', flipped: false },
                    { kanji: '父', meaning: 'Father', reading: 'chichi', origin_story: 'Two crossed swords representing dad lore.', flipped: false },
                    { kanji: '学', meaning: 'Study/Learn', reading: 'manabu', origin_story: 'Three kids wearing graduation caps trying to look smart.', flipped: false },
                    { kanji: '先', meaning: 'Before/Ahead', reading: 'saki / sen', origin_story: 'Moving your legs (儿) forward through the dirt (土).', flipped: false },
                    { kanji: '生', meaning: 'Life/Birth', reading: 'ikiru', origin_story: 'A sapling sprouting from the ground ready to pay taxes.', flipped: false },
                ],
                searchQuery: '',
                showBookmarksOnly: false,
                quiz: {
                    active: false,
                    questions: [],
                    currentIndex: 0,
                    answer: '',
                    message: '',
                    // Helper function to shuffle an array
                    shuffle(array) {
                        let currentIndex = array.length, randomIndex;
                        while (currentIndex !== 0) {
                            randomIndex = Math.floor(Math.random() * currentIndex);
                            currentIndex--;
                            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                        }
                        return array;
                    }
                },
                handleEnter() {
                    if (this.quiz.message !== '') {
                        this.nextQuestion();
                    } else {
                        if (this.quiz.answer.trim() !== '') {
                            this.checkAnswer();
                        }
                    }
                },
                startQuiz() {
                    this.quiz.active = true;
                    this.quiz.currentIndex = 0;
                    this.quiz.answer = '';
                    this.quiz.message = '';
                    this.quiz.shuffle(this.quiz.questions);
                    this.$nextTick(() => { if (this.$refs.quizInput) this.$refs.quizInput.focus(); });
                },
                checkAnswer() {
                    const correctAnswers = this.quiz.questions[this.quiz.currentIndex].answers;
                    if (correctAnswers.includes(this.quiz.answer.toLowerCase().trim())) {
                        this.quiz.message = 'Correct!';
                    } else {
                        this.quiz.message = 'Incorrect.';
                    }
                },
                nextQuestion() {
                    if (this.quiz.currentIndex < this.quiz.questions.length - 1) {
                        this.quiz.currentIndex++;
                        this.quiz.answer = '';
                        this.quiz.message = '';
                        this.$nextTick(() => { if (this.$refs.quizInput) this.$refs.quizInput.focus(); });
                    } else {
                        this.quiz.active = false;
                        this.quiz.message = 'Quiz finished!';
                    }
                },
                init() {
                    const saved = JSON.parse(localStorage.getItem('kanji-bookmarks') || '[]');
                    this.kanjis = this.kanjis.map(k => ({
                        ...k,
                        bookmarked: saved.includes(k.kanji)
                    }));
                    this.quiz.questions = this.kanjis.map(k => ({
                        kanji: k.kanji,
                        answers: k.meaning.toLowerCase().split('/').map(w => w.trim())
                    }));
                },
                toggleBookmark(kanji) {
                    kanji.bookmarked = !kanji.bookmarked;
                    const saved = this.kanjis.filter(k => k.bookmarked).map(k => k.kanji);
                    localStorage.setItem('kanji-bookmarks', JSON.stringify(saved));
                },
                get filteredKanjis() {
                    let filtered = this.kanjis;

                    if (this.showBookmarksOnly) {
                        filtered = filtered.filter(k => k.bookmarked);
                    }

                    if (this.searchQuery !== '') {
                        const query = this.searchQuery.toLowerCase();
                        filtered = filtered.filter(k =>
                            k.kanji.toLowerCase().includes(query) ||
                            k.meaning.toLowerCase().includes(query) ||
                            k.reading.toLowerCase().includes(query)
                        );
                    }

                    return filtered;
                }
            }))
        })
    </script>
</body>
