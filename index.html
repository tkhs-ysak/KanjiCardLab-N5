<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanjiCardLab – JLPT N5 Kanji Flashcards</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        [x-cloak] { display: none !important; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }

        /* 3D Flip Utilities */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Subtle dotted pattern for the front of the cards for a premium feel */
        .card-front {
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 16px 16px;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen py-12 px-6" x-data="kanjiApp()">
    <div class="max-w-7xl mx-auto">

        <!-- Header -->
        <header class="text-center mb-20 mt-8">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-slate-900 mb-6 drop-shadow-sm">
                KanjiCardLab
            </h1>
            <p class="text-xl md:text-2xl text-slate-600 font-medium max-w-2xl mx-auto">
                JLPT N5 Kanji Flashcards
            </p>
        </header>

        <!-- Search Bar -->
        <div x-show="!quizMode" class="max-w-2xl mx-auto mb-8">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="h-6 w-6 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" x-model="searchQuery" placeholder="Search by kanji, meaning, or reading..."
                    class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-200 bg-white placeholder-slate-400 focus:outline-none focus:border-black focus:ring-4 focus:ring-slate-200 transition-all text-lg shadow-sm">
            </div>

            <!-- Toolbar -->
            <div class="flex flex-wrap items-center gap-3 mt-4 text-sm font-medium">
                <button @click="showBookmarksOnly = !showBookmarksOnly"
                    :class="showBookmarksOnly ? 'text-black bg-slate-100 border-slate-300' : 'text-slate-500 hover:bg-slate-50 border-transparent'"
                    class="flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-colors outline-none focus:ring-2 focus:ring-slate-200 whitespace-nowrap">
                    <svg class="w-4 h-4 transition-colors shrink-0"
                        :class="showBookmarksOnly ? 'fill-black' : 'fill-none stroke-current'" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                    </svg>
                    Bookmarked (<span x-text="kanjis.filter(k => k.bookmarked && (difficultyFilter === 'all' || k.difficulty === difficultyFilter)).length"></span>)
                </button>
                <!-- Difficulty Filters -->
                <div class="flex bg-slate-100 p-1 rounded-lg">
                    <button @click="difficultyFilter = 'all'"
                        :class="difficultyFilter === 'all' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="px-3 py-1 text-sm font-medium rounded-md transition-all">All</button>
                    <button @click="difficultyFilter = 'easy'"
                        :class="difficultyFilter === 'easy' ? 'bg-green-100 text-green-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="px-3 py-1 text-sm font-medium rounded-md transition-all">Easy</button>
                    <button @click="difficultyFilter = 'medium'"
                        :class="difficultyFilter === 'medium' ? 'bg-yellow-100 text-yellow-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="px-3 py-1 text-sm font-medium rounded-md transition-all">Medium</button>
                    <button @click="difficultyFilter = 'hard'"
                        :class="difficultyFilter === 'hard' ? 'bg-red-100 text-red-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="px-3 py-1 text-sm font-medium rounded-md transition-all">Hard</button>
                </div>

                <button @click="openQuizSetup()"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-transparent text-slate-500 hover:bg-slate-50 hover:border-slate-300 transition-colors outline-none focus:ring-2 focus:ring-slate-200">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>
                    Quiz
                </button>
                <button @click="openAddCustomCard()"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-transparent text-slate-500 hover:bg-slate-50 hover:border-slate-300 transition-colors outline-none focus:ring-2 focus:ring-slate-200">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Add Card
                </button>

                <div class="text-slate-500 ml-auto"
                    x-show="searchQuery !== '' || showBookmarksOnly || difficultyFilter !== 'all'" x-transition>
                    Showing <span x-text="filteredKanjis.length"></span> results
                </div>
            </div>
        </div>

        <!-- Quiz Setup -->
        <div x-cloak x-show="quizSetupMode && !quizMode" x-transition class="max-w-lg mx-auto">
            <div class="flex items-center justify-between mb-8">
                <button @click="quizSetupMode = false"
                    class="flex items-center gap-2 text-slate-500 hover:text-black transition-colors text-sm font-medium">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to cards
                </button>
            </div>
            <div class="text-center mb-10">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Quiz Setup</p>
                <h2 class="text-3xl font-black text-black">Choose your kanji</h2>
            </div>
            <div class="space-y-3 mb-8">
                <!-- Bookmarked -->
                <button @click="quizSource = 'bookmarked'"
                    :class="quizSource === 'bookmarked' ? 'border-black bg-slate-50 shadow-md' : 'border-slate-200 hover:border-slate-400'"
                    class="w-full flex items-center justify-between p-5 rounded-2xl border-2 bg-white transition-all">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">⭐</span>
                        <div class="text-left">
                            <p class="font-bold text-black">Bookmarked</p>
                            <p class="text-sm text-slate-500">Your saved kanji</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-slate-400" x-text="kanjis.filter(k => k.bookmarked).length + ' kanji'"></span>
                        <div x-show="quizSource === 'bookmarked'" class="w-5 h-5 bg-black rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                    </div>
                </button>
                <!-- All -->
                <button @click="quizSource = 'all'"
                    :class="quizSource === 'all' ? 'border-black bg-slate-50 shadow-md' : 'border-slate-200 hover:border-slate-400'"
                    class="w-full flex items-center justify-between p-5 rounded-2xl border-2 bg-white transition-all">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">📚</span>
                        <div class="text-left">
                            <p class="font-bold text-black">All Kanji</p>
                            <p class="text-sm text-slate-500">The full deck</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-slate-400" x-text="kanjis.length + ' kanji'"></span>
                        <div x-show="quizSource === 'all'" class="w-5 h-5 bg-black rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                    </div>
                </button>
                <!-- Easy -->
                <button @click="quizSource = 'easy'"
                    :class="quizSource === 'easy' ? 'border-green-500 bg-green-50 shadow-md' : 'border-slate-200 hover:border-green-300'"
                    class="w-full flex items-center justify-between p-5 rounded-2xl border-2 bg-white transition-all">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">🟢</span>
                        <div class="text-left">
                            <p class="font-bold text-black">Easy</p>
                            <p class="text-sm text-slate-500">Beginner kanji</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-slate-400" x-text="kanjis.filter(k => k.difficulty === 'easy').length + ' kanji'"></span>
                        <div x-show="quizSource === 'easy'" class="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                    </div>
                </button>
                <!-- Medium -->
                <button @click="quizSource = 'medium'"
                    :class="quizSource === 'medium' ? 'border-yellow-500 bg-yellow-50 shadow-md' : 'border-slate-200 hover:border-yellow-300'"
                    class="w-full flex items-center justify-between p-5 rounded-2xl border-2 bg-white transition-all">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">🟡</span>
                        <div class="text-left">
                            <p class="font-bold text-black">Medium</p>
                            <p class="text-sm text-slate-500">Intermediate kanji</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-slate-400" x-text="kanjis.filter(k => k.difficulty === 'medium').length + ' kanji'"></span>
                        <div x-show="quizSource === 'medium'" class="w-5 h-5 bg-yellow-500 rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                    </div>
                </button>
                <!-- Hard -->
                <button @click="quizSource = 'hard'"
                    :class="quizSource === 'hard' ? 'border-red-500 bg-red-50 shadow-md' : 'border-slate-200 hover:border-red-300'"
                    class="w-full flex items-center justify-between p-5 rounded-2xl border-2 bg-white transition-all">
                    <div class="flex items-center gap-3">
                        <span class="text-xl">🔴</span>
                        <div class="text-left">
                            <p class="font-bold text-black">Hard</p>
                            <p class="text-sm text-slate-500">Advanced kanji</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-slate-400" x-text="kanjis.filter(k => k.difficulty === 'hard').length + ' kanji'"></span>
                        <div x-show="quizSource === 'hard'" class="w-5 h-5 bg-red-500 rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                    </div>
                </button>
            </div>
            <!-- Quiz Type -->
            <div class="mb-8">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Quiz Type</p>
                <div class="grid grid-cols-3 gap-3">
                    <button @click="quizType = 'mixed'"
                        :class="quizType === 'mixed' ? 'border-black bg-slate-50 shadow-md' : 'border-slate-200 hover:border-slate-400'"
                        class="flex flex-col items-center gap-2 p-4 rounded-2xl border-2 bg-white transition-all">
                        <span class="text-2xl">🔀</span>
                        <p class="font-bold text-black text-sm">Mixed</p>
                        <p class="text-xs text-slate-500 text-center">All types</p>
                    </button>
                    <button @click="quizType = 'meaning'"
                        :class="quizType === 'meaning' ? 'border-blue-500 bg-blue-50 shadow-md' : 'border-slate-200 hover:border-blue-300'"
                        class="flex flex-col items-center gap-2 p-4 rounded-2xl border-2 bg-white transition-all">
                        <span class="text-2xl">💬</span>
                        <p class="font-bold text-black text-sm">Meaning</p>
                        <p class="text-xs text-slate-500 text-center">意味</p>
                    </button>
                    <button @click="quizType = 'reading'"
                        :class="quizType === 'reading' ? 'border-purple-500 bg-purple-50 shadow-md' : 'border-slate-200 hover:border-purple-300'"
                        class="flex flex-col items-center gap-2 p-4 rounded-2xl border-2 bg-white transition-all">
                        <span class="text-2xl">📖</span>
                        <p class="font-bold text-black text-sm">Reading</p>
                        <p class="text-xs text-slate-500 text-center">読み方</p>
                    </button>
                </div>
            </div>

            <div x-show="quizSourceCount < 2" x-transition class="mb-4 p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-700 text-sm font-medium text-center">
                Need at least 2 kanji to start a quiz.
            </div>
            <button @click="startQuiz()"
                :disabled="quizSourceCount < 2"
                :class="quizSourceCount >= 2 ? 'bg-black hover:bg-slate-800 cursor-pointer' : 'bg-slate-200 text-slate-400 cursor-not-allowed'"
                class="w-full py-4 text-white rounded-2xl font-bold text-lg transition-colors focus:outline-none focus:ring-4 focus:ring-slate-300">
                Start Quiz
            </button>
        </div>

        <!-- Quiz Mode -->
        <div x-cloak x-show="quizMode && !quizFinished" x-transition class="max-w-2xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <button @click="exitQuiz()"
                    class="flex items-center gap-2 text-slate-500 hover:text-black transition-colors text-sm font-medium">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to cards
                </button>
                <div class="text-sm font-bold text-slate-500">
                    <span x-text="currentQuestion + 1"></span> / <span x-text="quizQuestions.length"></span>
                </div>
            </div>
            <div class="w-full h-1.5 bg-slate-200 rounded-full mb-12">
                <div class="h-full bg-black rounded-full transition-all duration-500"
                    :style="`width: ${((currentQuestion + 1) / quizQuestions.length) * 100}%`"></div>
            </div>
            <template x-if="currentQ">
                <div class="text-center">
                    <div class="mb-12 relative">
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6"
                            x-text="currentQ.type === 'kanji-to-meaning' ? 'What does this kanji mean?' : currentQ.type === 'meaning-to-kanji' ? 'Which kanji means...' : 'How do you read this kanji?'"></p>
                        <span class="text-8xl md:text-9xl font-semibold text-slate-800 drop-shadow-sm"
                            x-show="currentQ.type === 'kanji-to-meaning' || currentQ.type === 'kanji-to-reading'"
                            x-text="currentQ.kanji.kanji"></span>
                        <span class="text-5xl md:text-6xl font-bold text-black"
                            x-show="currentQ.type === 'meaning-to-kanji'"
                            x-text="currentQ.kanji.meaning"></span>
                        <!-- Bookmark button -->
                        <button @click="toggleBookmark(currentQ.kanji)"
                            class="absolute top-0 right-0 p-2 rounded-full hover:bg-slate-100 transition-colors group/btn">
                            <svg class="w-7 h-7 transition-all duration-300 group-hover/btn:scale-110"
                                :class="currentQ.kanji.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-300 fill-none stroke-current'"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                            </svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <template x-for="(choice, idx) in currentQ.choices" :key="idx">
                            <button @click="selectAnswer(getChoiceLabel(currentQ, choice))"
                                :disabled="showAnswer"
                                :class="{
                                    'border-slate-200 hover:border-black hover:shadow-lg': !showAnswer,
                                    'border-green-400 bg-green-50 shadow-lg': showAnswer && getChoiceLabel(currentQ, choice) === currentQ.correctAnswer,
                                    'border-red-400 bg-red-50': showAnswer && selectedAnswer === getChoiceLabel(currentQ, choice) && selectedAnswer !== currentQ.correctAnswer,
                                    'border-slate-100 opacity-50': showAnswer && getChoiceLabel(currentQ, choice) !== currentQ.correctAnswer && selectedAnswer !== getChoiceLabel(currentQ, choice),
                                }"
                                class="p-6 rounded-2xl border-2 bg-white transition-all duration-300 cursor-pointer text-center"
                                :class="currentQ.type === 'kanji-to-meaning' ? 'text-lg font-semibold' : currentQ.type === 'meaning-to-kanji' ? 'text-4xl font-semibold' : 'text-xl font-semibold'">
                                <span x-text="getChoiceLabel(currentQ, choice)"></span>
                            </button>
                        </template>
                    </div>
                    <div x-show="showAnswer" x-transition class="mt-6">
                        <p class="text-lg font-bold mb-4"
                            :class="selectedAnswer === currentQ.correctAnswer ? 'text-green-600' : 'text-red-600'"
                            x-text="selectedAnswer === currentQ.correctAnswer ? 'Correct!' : 'Wrong!'"></p>
                        <p class="text-sm text-slate-500 mb-6" x-show="selectedAnswer !== currentQ.correctAnswer">
                            The answer is <span class="font-bold text-black" x-text="currentQ.correctAnswer"></span>
                            (<span x-text="currentQ.kanji.reading"></span>)
                        </p>
                        <button @click="nextQuestion()"
                            class="px-8 py-3 bg-black text-white rounded-xl font-bold hover:bg-slate-800 transition-colors focus:outline-none focus:ring-4 focus:ring-slate-300"
                            x-text="currentQuestion < quizQuestions.length - 1 ? 'Next' : 'See Results'">
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <!-- Quiz Results -->
        <div x-cloak x-show="quizMode && quizFinished" x-transition class="max-w-2xl mx-auto text-center">
            <div class="mb-12">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Your Score</p>
                <p class="text-7xl md:text-8xl font-black text-black mb-2">
                    <span x-text="score"></span><span class="text-slate-300"> / </span><span x-text="quizQuestions.length"></span>
                </p>
                <p class="text-xl text-slate-500 font-medium"
                    x-text="score === quizQuestions.length ? 'Perfect! You nailed it!' : score >= quizQuestions.length * 0.7 ? 'Nice work! Keep it up!' : 'Keep practicing, you got this!'"></p>
            </div>
            <div x-show="wrongAnswers.length > 0" class="mb-12">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Review mistakes</p>
                <div class="space-y-3">
                    <template x-for="(w, idx) in wrongAnswers" :key="idx">
                        <div class="flex items-center gap-4 p-4 bg-white border border-slate-200 rounded-2xl text-left">
                            <span class="text-4xl font-semibold" x-text="w.kanji"></span>
                            <div class="flex-1 min-w-0">
                                <p class="font-bold text-black" x-text="w.meaning"></p>
                                <p class="text-sm text-slate-500" x-text="w.reading"></p>
                            </div>
                            <div class="text-right text-sm shrink-0">
                                <p class="text-red-500 line-through" x-text="w.yourAnswer"></p>
                                <p class="text-green-600 font-bold" x-text="w.correctAnswer"></p>
                            </div>
                            <button @click="findKanjiByChar(w.kanji) && toggleBookmark(findKanjiByChar(w.kanji))"
                                class="p-2 rounded-full hover:bg-slate-100 transition-colors shrink-0 group/btn">
                                <svg class="w-5 h-5 transition-all duration-300 group-hover/btn:scale-110"
                                    :class="findKanjiByChar(w.kanji)?.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-300 fill-none stroke-current'"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />

            <div class="flex items-center justify-center gap-4">
                <button @click="retryQuiz()"

                <button @click="exitQuiz()"
                    class="px-8 py-3 bg-white text-black border-2 border-slate-200 rounded-xl font-bold hover:border-black transition-colors focus:outline-none focus:ring-4 focus:ring-slate-200">

        <!-- Flashcard Grid -->
        <div x-show="!quizMode && !quizSetupMode" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-8">
            <template x-for="kanji in filteredKanjis" :key="kanji.id || kanji.kanji">
                <div class="relative w-full h-80 group perspective-1000" @click="kanji.flipped = !kanji.flipped">

                    <div x-show="deleteConfirmId === kanji.id" @click.stop

                        <p class="text-sm font-bold text-slate-700">Delete this card?</p>
                        <p class="text-xs text-slate-400">This cannot be undone.</p>
                        <div class="flex gap-3">
                            <button @click.stop="deleteCustomCard(kanji)"

                            <button @click.stop="deleteConfirmId = null"
                                class="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors">Cancel</button>
                        </div>
                    </div>

                    <!-- The Card Inner -->
                    <div class="w-full h-full transition-transform duration-700 transform-style-3d cursor-pointer shadow-xl rounded-3xl"
                        :class="kanji.flipped ? 'rotate-y-180' : ''">

                        <!-- Front Face -->
                        <div
                            class="absolute inset-0 w-full h-full backface-hidden card-front bg-white border border-slate-200 rounded-3xl flex flex-col items-center justify-center transition-colors hover:border-black group-hover:shadow-2xl">
                            <!-- Bookmark Star -->
                            <button @click.prevent.stop="toggleBookmark(kanji)"
                                class="absolute top-4 right-4 p-2 rounded-full hover:bg-slate-100 transition-colors z-10 group/btn">
                                <svg class="w-7 h-7 transition-all duration-300 group-hover/btn:scale-110"
                                    :class="kanji.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-200 fill-none stroke-current'"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                            <!-- Custom Card Controls -->
                            <template x-if="kanji.isCustom">
                                <div class="absolute top-4 left-4 flex gap-1 z-10">
                                    <button @click.prevent.stop="openEditCustomCard(kanji)"
                                        class="p-2 rounded-full hover:bg-slate-100 transition-colors">
                                        <svg class="w-5 h-5 text-slate-300 hover:text-slate-600 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                        </svg>
                                    </button>
                                    <button @click.prevent.stop="deleteConfirmId = kanji.id"
                                        class="p-2 rounded-full hover:bg-red-50 transition-colors">
                                        <svg class="w-5 h-5 text-slate-300 hover:text-red-500 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </template>
                            <span
                                class="text-9xl mb-4 font-semibold text-slate-800 drop-shadow-sm transition-transform duration-300 group-hover:scale-110"
                                x-text="kanji.kanji"></span>
                            <!-- Custom badge -->
                            <span x-show="kanji.isCustom"
                                class="absolute bottom-4 left-4 text-[0.6rem] font-bold text-indigo-400 bg-indigo-50 px-2 py-0.5 rounded-full uppercase tracking-wider">Custom</span>
                            <span
                                class="text-slate-400 font-bold tracking-widest uppercase text-xs opacity-0 transition-opacity duration-300 group-hover:opacity-100">Click
                                to flip</span>
                        </div>

                        <!-- Back Face -->
                        <div
                            class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-white text-slate-800 rounded-3xl p-6 flex flex-col justify-start items-center text-center shadow-2xl border border-slate-200 overflow-y-auto no-scrollbar">
                            <button @click.prevent.stop="toggleBookmark(kanji)"
                                class="absolute top-4 right-4 p-2 rounded-full hover:bg-slate-100 transition-colors z-10 group/btn shrink-0">
                                <svg class="w-7 h-7 transition-all duration-300 group-hover/btn:scale-110"
                                    :class="kanji.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-200 fill-none stroke-current'"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                            <!-- Custom Card Controls (back) -->
                            <template x-if="kanji.isCustom">
                                <div class="absolute top-4 left-4 flex gap-1 z-10 shrink-0">
                                    <button @click.prevent.stop="openEditCustomCard(kanji)"
                                        class="p-2 rounded-full hover:bg-slate-100 transition-colors">
                                        <svg class="w-5 h-5 text-slate-300 hover:text-slate-600 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                        </svg>
                                    </button>
                                    <button @click.prevent.stop="deleteConfirmId = kanji.id"
                                        class="p-2 rounded-full hover:bg-red-50 transition-colors">
                                        <svg class="w-5 h-5 text-slate-300 hover:text-red-500 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </template>
                            <h3 class="text-3xl font-bold text-black mb-3 mt-2 leading-tight shrink-0"
                                x-text="kanji.meaning"></h3>
                            <div class="flex flex-col gap-1 w-full mb-3 shrink-0">
                                <p class="text-[0.7rem] font-bold text-slate-400 uppercase tracking-widest">Readings</p>
                                <p class="text-sm text-slate-700 font-mono bg-slate-50 py-1.5 px-3 rounded-lg border border-slate-200"
                                    x-text="kanji.reading"></p>
                            </div>
                            <div class="flex flex-col gap-1 w-full mb-3 text-left shrink-0" x-show="kanji.example_ja">
                                <p class="text-[0.7rem] font-bold text-slate-400 uppercase tracking-widest text-center">
                                    Example</p>
                                <div class="bg-blue-50/40 border border-blue-100 p-3 rounded-xl">
                                    <p class="font-bold text-blue-900 text-lg mb-0.5" x-text="kanji.example_ja"></p>
                                    <p class="text-xs text-blue-800/80 mb-1 font-mono" x-text="kanji.example_read"></p>
                                    <p class="text-sm text-slate-600 leading-snug" x-text="kanji.example_en"></p>
                                </div>
                            </div>
                            <div class="relative mt-auto pt-3 border-t border-slate-100 w-full shrink-0" x-show="kanji.origin_story">
                                <p class="text-[0.90rem] text-slate-500 italic leading-snug"
                                    x-text="kanji.origin_story"></p>
                            </div>
                        </div>
                    </div>
                </div>
        </div>
        </template>
    </div>

    <!-- Custom Card Modal -->
    <div x-cloak x-show="customCardModalOpen" x-transition.opacity
        class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
        @click.self="closeCustomCardModal()" @keydown.escape.window="customCardModalOpen && closeCustomCardModal()">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-8"
            x-transition.scale.origin.center @click.stop>
            <h2 class="text-2xl font-black text-black mb-6"
                x-text="editingCard ? 'Edit Custom Card' : 'Add Custom Card'"></h2>

            <!-- Kanji -->
            <div class="mb-4">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Kanji Character *</label>
                <input type="text" x-model="customCardForm.kanji" maxlength="4"
                    class="w-full px-4 py-3 rounded-xl border-2 transition-all text-3xl text-center outline-none focus:ring-4 focus:ring-slate-200"
                    :class="customCardErrors.kanji ? 'border-red-300 focus:border-red-400' : 'border-slate-200 focus:border-black'">
                <p x-show="customCardErrors.kanji" x-text="customCardErrors.kanji" class="text-red-500 text-xs mt-1"></p>
            </div>

            <!-- Meaning -->
            <div class="mb-4">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Meaning *</label>
                <input type="text" x-model="customCardForm.meaning" placeholder="e.g. Cat"
                    class="w-full px-4 py-2.5 rounded-xl border-2 transition-all outline-none focus:ring-4 focus:ring-slate-200"
                    :class="customCardErrors.meaning ? 'border-red-300 focus:border-red-400' : 'border-slate-200 focus:border-black'">
                <p x-show="customCardErrors.meaning" x-text="customCardErrors.meaning" class="text-red-500 text-xs mt-1"></p>
            </div>

            <!-- Reading -->
            <div class="mb-4">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Reading *</label>
                <input type="text" x-model="customCardForm.reading" placeholder="e.g. byou / neko"
                    class="w-full px-4 py-2.5 rounded-xl border-2 transition-all outline-none focus:ring-4 focus:ring-slate-200"
                    :class="customCardErrors.reading ? 'border-red-300 focus:border-red-400' : 'border-slate-200 focus:border-black'">
                <p x-show="customCardErrors.reading" x-text="customCardErrors.reading" class="text-red-500 text-xs mt-1"></p>
            </div>

            <!-- Difficulty -->
            <div class="mb-4">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Difficulty</label>
                <div class="flex bg-slate-100 p-1 rounded-lg">
                    <button @click="customCardForm.difficulty = 'easy'" type="button"
                        :class="customCardForm.difficulty === 'easy' ? 'bg-green-100 text-green-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="flex-1 px-3 py-1.5 text-sm font-medium rounded-md transition-all">Easy</button>
                    <button @click="customCardForm.difficulty = 'medium'" type="button"
                        :class="customCardForm.difficulty === 'medium' ? 'bg-yellow-100 text-yellow-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="flex-1 px-3 py-1.5 text-sm font-medium rounded-md transition-all">Medium</button>
                    <button @click="customCardForm.difficulty = 'hard'" type="button"
                        :class="customCardForm.difficulty === 'hard' ? 'bg-red-100 text-red-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="flex-1 px-3 py-1.5 text-sm font-medium rounded-md transition-all">Hard</button>
                </div>
            </div>

            <!-- Origin Story -->
            <div class="mb-4">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Memory Hint / Origin Story</label>
                <textarea x-model="customCardForm.origin_story" rows="2" placeholder="How to remember this kanji..."
                    class="w-full px-4 py-2.5 rounded-xl border-2 border-slate-200 focus:border-black transition-all outline-none focus:ring-4 focus:ring-slate-200 resize-none"></textarea>
            </div>

            <!-- Example fields -->
            <div class="mb-4">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Example (Japanese)</label>
                <input type="text" x-model="customCardForm.example_ja" placeholder="e.g. 猫カフェ"
                    class="w-full px-4 py-2.5 rounded-xl border-2 border-slate-200 focus:border-black transition-all outline-none focus:ring-4 focus:ring-slate-200">
            </div>
            <div class="mb-4">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Example (Reading)</label>
                <input type="text" x-model="customCardForm.example_read" placeholder="e.g. neko kafe"
                    class="w-full px-4 py-2.5 rounded-xl border-2 border-slate-200 focus:border-black transition-all outline-none focus:ring-4 focus:ring-slate-200">
            </div>
            <div class="mb-6">
                <label class="block text-[0.65rem] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Example (English)</label>
                <input type="text" x-model="customCardForm.example_en" placeholder="e.g. Cat cafe"
                    class="w-full px-4 py-2.5 rounded-xl border-2 border-slate-200 focus:border-black transition-all outline-none focus:ring-4 focus:ring-slate-200">
            </div>

            <!-- Actions -->
            <div class="flex gap-3">
                <button @click="saveCustomCard()"
                    class="flex-1 py-3 bg-black text-white rounded-xl font-bold hover:bg-slate-800 transition-colors"
                    x-text="editingCard ? 'Save Changes' : 'Add Card'"></button>
                <button @click="closeCustomCardModal()"
                    class="px-6 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-colors">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-24 text-center text-slate-400 text-sm font-medium">
        <p> An interactive study tool for JLPT N5 learners. </p>
    </footer>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('kanjiApp', () => ({
                kanjis: [
                    { kanji: '一', meaning: "One", reading: "ichi, itsu / hito-, hito.tsu", origin_story: "A single horizontal stroke representing the number one.", example_ja: "\u4e00\u65e5", example_read: "tsuitachi / ichinichi", example_en: "First day of the month / One day", difficulty: 'easy' },
                    { kanji: '二', meaning: "Two", reading: "ni / futa, futa.tsu", origin_story: "Two horizontal strokes stacked to represent the number two.", example_ja: "\u4e8c\u4eba", example_read: "futari", example_en: "Two people", difficulty: 'easy' },
                    { kanji: '三', meaning: "Three", reading: "san / mi, mi.tsu, mit.tsu", origin_story: "Three horizontal strokes — the counting pattern for one, two, three.", example_ja: "\u4e09\u65e5\u6708", example_read: "mikazuki", example_en: "Crescent moon (3rd-day moon)", difficulty: 'easy' },
                    { kanji: '四', meaning: "Four", reading: "shi / yon, yo, yo.tsu, yot.tsu", origin_story: "An enclosure with divided inner strokes; originally depicted nostrils or breath.", example_ja: "\u56db\u5b63", example_read: "shiki", example_en: "Four seasons", difficulty: 'easy' },
                    { kanji: '五', meaning: "Five", reading: "go / itsu, itsu.tsu", origin_story: "Crossed strokes between two horizontal lines — an ancient numeral for five.", example_ja: "\u4e94\u611f", example_read: "gokan", example_en: "The five senses", difficulty: 'easy' },
                    { kanji: '六', meaning: "Six", reading: "roku, riku / mu, mu.tsu, mut.tsu", origin_story: "A lid radical with diverging lower strokes, representing six.", example_ja: "\u516d\u672c\u6728", example_read: "Roppongi", example_en: "Roppongi (place name)", difficulty: 'easy' },
                    { kanji: '七', meaning: "Seven", reading: "shichi / nana, nana.tsu", origin_story: "A bent stroke crossing a horizontal line — an abstract numeral for seven.", example_ja: "\u4e03\u5915", example_read: "tanabata", example_en: "Star Festival", difficulty: 'easy' },
                    { kanji: '八', meaning: "Eight", reading: "hachi / ya, ya.tsu, yat.tsu, you", origin_story: "Two strokes spreading apart, suggesting division — the character for eight.", example_ja: "\u516b\u767e\u5c4b", example_read: "yaoya", example_en: "Greengrocer", difficulty: 'easy' },
                    { kanji: '九', meaning: "Nine", reading: "kyuu, ku / kokono, kokono.tsu", origin_story: "A single hooked stroke suggesting a bent arm — the numeral for nine.", example_ja: "\u4e5d\u5dde", example_read: "Kyuushuu", example_en: "Kyushu (island)", difficulty: 'easy' },
                    { kanji: '十', meaning: "Ten", reading: "juu, ji, to, too", origin_story: "A cross of vertical and horizontal strokes, representing ten or completeness.", example_ja: "\u5341\u5206", example_read: "juubun", example_en: "Enough / Sufficient", difficulty: 'easy' },
                    { kanji: '百', meaning: "Hundred", reading: "hyaku, byaku / momo", origin_story: "一 (one) placed over 白 (white); originally signified a large number.", example_ja: "\u767e\u8ca8\u5e97", example_read: "hyakkaten", example_en: "Department store", difficulty: 'medium' },
                    { kanji: '千', meaning: "Thousand", reading: "sen / chi", origin_story: "A modified form of 人 (person) with a top stroke, symbolizing a thousand.", example_ja: "\u5343\u8449", example_read: "Chiba", example_en: "Chiba (prefecture, lit. Thousand leaves)", difficulty: 'easy' },
                    { kanji: '万', meaning: "Ten Thousand, Many", reading: "man, ban / yorozu", origin_story: "A simplified ancient pictograph now used exclusively for ten thousand.", example_ja: "\u4e07\u6b73", example_read: "banzai", example_en: "Hurrah / Long life", difficulty: 'easy' },
                    { kanji: '円', meaning: "Yen, Circle, Round", reading: "en / maru.i", origin_story: "Simplified form of 圓 (round); an enclosure representing a circle or yen.", example_ja: "\u5186\u6ed1", example_read: "enkatsu", example_en: "Smooth / Unhindered", difficulty: 'easy' },
                    { kanji: '日', meaning: "Sun, Day, Japan", reading: "nichi, jitsu / hi, -bi, -ka", origin_story: "A rectangle with a center line — a pictograph of the sun.", example_ja: "\u65e5\u66dc\u65e5", example_read: "nichiyoubi", example_en: "Sunday", difficulty: 'easy' },
                    { kanji: '月', meaning: "Moon, Month", reading: "getsu, gatsu / tsuki", origin_story: "A crescent form with inner strokes — a pictograph of the moon.", example_ja: "\u4eca\u6708", example_read: "kongetsu", example_en: "This month", difficulty: 'easy' },
                    { kanji: '火', meaning: "Fire", reading: "ka / hi, -bi, ho-", origin_story: "Rising flames with sparks on either side — a pictograph of fire.", example_ja: "\u82b1\u706b", example_read: "hanabi", example_en: "Fireworks", difficulty: 'easy' },
                    { kanji: '水', meaning: "Water", reading: "sui / mizu", origin_story: "A central flow with splashing drops — a pictograph of water.", example_ja: "\u6c34\u661f", example_read: "suisei", example_en: "Mercury (planet)", difficulty: 'easy' },
                    { kanji: '木', meaning: "Tree, Wood", reading: "boku, moku / ki, ko-", origin_story: "Branches above and roots below — a pictograph of a tree.", example_ja: "\u6728\u6f0f\u308c\u65e5", example_read: "komorebi", example_en: "Sunlight filtering through trees", difficulty: 'easy' },
                    { kanji: '金', meaning: "Gold, Money, Metal", reading: "kin, kon, gon / kane, kana-", origin_story: "人 (lid) over a structure with 土 (earth) and dots for metal nuggets — gold or metal.", example_ja: "\u304a\u91d1\u6301\u3061", example_read: "okanemochi", example_en: "Rich person", difficulty: 'medium' },
                    { kanji: '土', meaning: "Earth, Soil, Ground", reading: "do, to / tsuchi", origin_story: "A cross planted on the ground — a pictograph of earth or soil.", example_ja: "\u304a\u571f\u7523", example_read: "omiyage", example_en: "Souvenir", difficulty: 'easy' },
                    { kanji: '山', meaning: "Mountain", reading: "san, zan / yama", origin_story: "Three peaks rising upward — a pictograph of mountains.", example_ja: "\u5bcc\u58eb\u5c71", example_read: "Fujisan", example_en: "Mount Fuji", difficulty: 'easy' },

                    { kanji: '父', meaning: "Father", reading: "fu / chichi", origin_story: "A hand holding an axe — a pictograph of a father figure.", example_ja: "\u304a\u7236\u3055\u3093", example_read: "otousan", example_en: "Father", difficulty: 'easy' },
                    { kanji: '学', meaning: "Study, Learning, Science", reading: "gaku / mana.bu", origin_story: "子 (child) under a roof with reaching hands — to study or learning.", example_ja: "\u5b66\u751f", example_read: "gakusei", example_en: "Student", difficulty: 'medium' },
                    { kanji: '先', meaning: "Before, Ahead, Previous", reading: "sen / saki, ma.zu", origin_story: "儿 (legs) stepping ahead of 土 (ground) — before or ahead.", example_ja: "\u5148\u751f", example_read: "sensei", example_en: "Teacher", difficulty: 'medium' },
                    { kanji: '生', meaning: "Life, Genuine, Birth", reading: "sei, shou / i.kiru, u.mu, nama", origin_story: "A sprout emerging from the soil — life, birth, or genuine.", example_ja: "\u8a95\u751f\u65e5", example_read: "tanjoubi", example_en: "Birthday", difficulty: 'easy' },
                ],
                searchQuery: '',
                showBookmarksOnly: false,
                difficultyFilter: 'all',

                // Quiz state
                quizMode: false,
                quizSetupMode: false,
                quizSource: 'bookmarked',
                quizType: 'mixed',
                quizQuestions: [],
                currentQuestion: 0,
                selectedAnswer: null,
                showAnswer: false,
                score: 0,
                wrongAnswers: [],
                quizFinished: false,

                // Custom card state
                customCardModalOpen: false,
                editingCard: null,
                customCardForm: {
                    kanji: '', meaning: '', reading: '', origin_story: '',
                    example_ja: '', example_read: '', example_en: '', difficulty: 'medium'
                },
                customCardErrors: {},
                deleteConfirmId: null,

                init() {
                    this.loadCustomCards();
                    const saved = JSON.parse(localStorage.getItem('kanji-bookmarks') || '[]');
                    this.kanjis = this.kanjis.map(k => ({
                        ...k,
                        bookmarked: saved.includes(k.kanji),
                        flipped: false
                    }));
                },
                loadCustomCards() {
                    const saved = JSON.parse(localStorage.getItem('kanji-custom-cards') || '[]');
                    saved.forEach(card => {
                        card.isCustom = true;
                        this.kanjis.push(card);
                    });
                },
                saveCustomCards() {
                    const customs = this.kanjis
                        .filter(k => k.isCustom)
                        .map(({ bookmarked, flipped, ...rest }) => rest);
                    localStorage.setItem('kanji-custom-cards', JSON.stringify(customs));
                },
                openAddCustomCard() {
                    this.editingCard = null;
                    this.customCardForm = {
                        kanji: '', meaning: '', reading: '', origin_story: '',
                        example_ja: '', example_read: '', example_en: '', difficulty: 'medium'
                    };
                    this.customCardErrors = {};
                    this.customCardModalOpen = true;
                },
                openEditCustomCard(card) {
                    this.editingCard = card;
                    this.customCardForm = {
                        kanji: card.kanji, meaning: card.meaning, reading: card.reading,
                        origin_story: card.origin_story || '', example_ja: card.example_ja || '',
                        example_read: card.example_read || '', example_en: card.example_en || '',
                        difficulty: card.difficulty
                    };
                    this.customCardErrors = {};
                    this.customCardModalOpen = true;
                },
                validateCustomCardForm() {
                    this.customCardErrors = {};
                    if (!this.customCardForm.kanji.trim()) this.customCardErrors.kanji = 'Required';
                    if (!this.customCardForm.meaning.trim()) this.customCardErrors.meaning = 'Required';
                    if (!this.customCardForm.reading.trim()) this.customCardErrors.reading = 'Required';
                    if (this.customCardForm.kanji.trim()) {
                        const dup = this.kanjis.some(k =>
                            k.kanji === this.customCardForm.kanji.trim() &&
                            (!this.editingCard || k.id !== this.editingCard.id)
                        );
                        if (dup) this.customCardErrors.kanji = 'This kanji already exists';
                    }
                    return Object.keys(this.customCardErrors).length === 0;
                },
                saveCustomCard() {
                    if (!this.validateCustomCardForm()) return;
                    if (this.editingCard) {
                        const idx = this.kanjis.findIndex(k => k.id === this.editingCard.id);
                        if (idx !== -1) {
                            Object.assign(this.kanjis[idx], {
                                kanji: this.customCardForm.kanji.trim(),
                                meaning: this.customCardForm.meaning.trim(),
                                reading: this.customCardForm.reading.trim(),
                                origin_story: this.customCardForm.origin_story.trim(),
                                example_ja: this.customCardForm.example_ja.trim(),
                                example_read: this.customCardForm.example_read.trim(),
                                example_en: this.customCardForm.example_en.trim(),
                                difficulty: this.customCardForm.difficulty
                            });
                        }
                    } else {
                        this.kanjis.push({
                            id: 'custom_' + Date.now(),
                            kanji: this.customCardForm.kanji.trim(),
                            meaning: this.customCardForm.meaning.trim(),
                            reading: this.customCardForm.reading.trim(),
                            origin_story: this.customCardForm.origin_story.trim(),
                            example_ja: this.customCardForm.example_ja.trim(),
                            example_read: this.customCardForm.example_read.trim(),
                            example_en: this.customCardForm.example_en.trim(),
                            difficulty: this.customCardForm.difficulty,
                            isCustom: true, bookmarked: false, flipped: false
                        });
                    }
                    this.saveCustomCards();
                    this.customCardModalOpen = false;
                },
                deleteCustomCard(card) {
                    this.kanjis = this.kanjis.filter(k => k.id !== card.id);
                    this.saveCustomCards();
                    const savedBookmarks = this.kanjis.filter(k => k.bookmarked).map(k => k.kanji);
                    localStorage.setItem('kanji-bookmarks', JSON.stringify(savedBookmarks));
                    this.deleteConfirmId = null;
                },
                closeCustomCardModal() {
                    this.customCardModalOpen = false;
                    this.editingCard = null;
                    this.customCardErrors = {};
                },
                toggleBookmark(kanji) {
                    kanji.bookmarked = !kanji.bookmarked;
                    const saved = this.kanjis.filter(k => k.bookmarked).map(k => k.kanji);
                    localStorage.setItem('kanji-bookmarks', JSON.stringify(saved));
                },
                findKanjiByChar(char) {
                    return this.kanjis.find(k => k.kanji === char) || null;
                },
                get filteredKanjis() {
                    let filtered = this.kanjis;

                    if (this.difficultyFilter !== 'all') {
                        filtered = filtered.filter(k => k.difficulty === this.difficultyFilter);
                    }

                    if (this.showBookmarksOnly) {
                        filtered = filtered.filter(k => k.bookmarked);
                    }

                    if (this.searchQuery !== '') {
                        const query = this.searchQuery.toLowerCase();
                        filtered = filtered.filter(k =>
                            k.kanji.toLowerCase().includes(query) ||
                            k.meaning.toLowerCase().includes(query) ||
                            k.reading.toLowerCase().includes(query)
                        );
                    }

                    return filtered;
                },
                shuffleArray(arr) {
                    const a = [...arr];
                    for (let i = a.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [a[i], a[j]] = [a[j], a[i]];
                    }
                    return a;
                },
                openQuizSetup() {
                    this.quizSetupMode = true;
                },
                get quizSourceCount() {
                    if (this.quizSource === 'bookmarked') return this.kanjis.filter(k => k.bookmarked).length;
                    if (this.quizSource === 'all') return this.kanjis.length;
                    return this.kanjis.filter(k => k.difficulty === this.quizSource).length;
                },
                startQuiz() {
                    let pool;
                    if (this.quizSource === 'bookmarked') {
                        pool = this.kanjis.filter(k => k.bookmarked);
                    } else if (this.quizSource === 'all') {
                        pool = [...this.kanjis];
                    } else {
                        pool = this.kanjis.filter(k => k.difficulty === this.quizSource);
                    }
                    if (pool.length < 2) return;

                    this.quizSetupMode = false;
                    this.quizQuestions = this.shuffleArray(pool).map(kanji => {
                        const r = Math.random();
                        let type;
                        if (this.quizType === 'reading') {
                            type = 'kanji-to-reading';
                        } else if (this.quizType === 'meaning') {
                            type = r < 0.5 ? 'kanji-to-meaning' : 'meaning-to-kanji';
                        } else {
                            type = r < 0.33 ? 'kanji-to-meaning' : r < 0.67 ? 'meaning-to-kanji' : 'kanji-to-reading';
                        }
                        const others = this.shuffleArray(
                            this.kanjis.filter(k => k.kanji !== kanji.kanji)
                        ).slice(0, 3);
                        const choices = this.shuffleArray([kanji, ...others]);
                        return {
                            kanji: kanji,
                            type: type,
                            choices: choices,
                            correctAnswer: type === 'kanji-to-meaning' ? kanji.meaning : type === 'meaning-to-kanji' ? kanji.kanji : kanji.reading,
                        };
                    });

                    this.currentQuestion = 0;
                    this.selectedAnswer = null;
                    this.showAnswer = false;
                    this.score = 0;
                    this.wrongAnswers = [];
                    this.quizFinished = false;
                    this.quizMode = true;
                },
                get currentQ() {
                    return this.quizQuestions[this.currentQuestion] || null;
                },
                getChoiceLabel(q, choice) {
                    if (q.type === 'kanji-to-meaning') return choice.meaning;
                    if (q.type === 'meaning-to-kanji') return choice.kanji;
                    return choice.reading;
                },
                selectAnswer(answer) {
                    if (this.showAnswer) return;
                    this.selectedAnswer = answer;
                    this.showAnswer = true;

                    const q = this.currentQ;
                    if (answer === q.correctAnswer) {
                        this.score++;
                    } else {
                        this.wrongAnswers.push({
                            kanji: q.kanji.kanji,
                            meaning: q.kanji.meaning,
                            reading: q.kanji.reading,
                            yourAnswer: answer,
                            correctAnswer: q.correctAnswer,
                            type: q.type,
                        });
                    }
                },
                nextQuestion() {
                    if (this.currentQuestion < this.quizQuestions.length - 1) {
                        this.currentQuestion++;
                        this.selectedAnswer = null;
                        this.showAnswer = false;
                    } else {
                        this.quizFinished = true;
                    }
                },
                retryQuiz() {
                    this.startQuiz();
                },
                exitQuiz() {
                    this.quizMode = false;
                    this.quizSetupMode = false;
                    this.quizFinished = false;
                }
            }))
        })
    </script>
</body>
