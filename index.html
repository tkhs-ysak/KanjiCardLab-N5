<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Kidding Me?</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
        }

        /* 3D Flip Utilities */
        .perspective-1000 {
            perspective: 1000px;
        }

        .transform-style-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Subtle dotted pattern for the front of the cards for a premium feel */
        .card-front {
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 16px 16px;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen py-12 px-6" x-data="kanjiApp()">
    <div class="max-w-7xl mx-auto">

        <!-- Header -->
        <header class="text-center mb-20 mt-8">
            <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-slate-900 mb-6 drop-shadow-sm">
                Kanji Kidding Me?
            </h1>
            <p class="text-xl md:text-2xl text-slate-600 font-medium max-w-2xl mx-auto">
                Because learning character etymology shouldn't require a history degree.
            </p>
        </header>

        <!-- Search Bar -->
        <div class="max-w-2xl mx-auto mb-16 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-6 w-6 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text" x-model="searchQuery" placeholder="Search by kanji, meaning, or reading..."
                class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-slate-200 bg-white placeholder-slate-400 focus:outline-none focus:border-black focus:ring-4 focus:ring-slate-200 transition-all text-lg shadow-sm">

            <!-- Bookmark Toggle & Results Counter Row -->
            <div class="absolute -bottom-10 left-0 right-0 flex justify-between items-center text-sm font-medium">
                <div class="flex items-center gap-4">
                    <button @click="showBookmarksOnly = !showBookmarksOnly"
                        :class="showBookmarksOnly ? 'text-black bg-slate-100 border-slate-300' : 'text-slate-500 hover:bg-slate-50 border-transparent'"
                        class="flex items-center gap-2 px-3 py-1.5 rounded-lg border transition-colors outline-none focus:ring-2 focus:ring-slate-200">
                        <svg class="w-4 h-4 transition-colors"
                            :class="showBookmarksOnly ? 'fill-black' : 'fill-none stroke-current'" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                        </svg>
                        Bookmarked (<span x-text="kanjis.filter(k => k.bookmarked).length"></span>)
                    </button>
                    <!-- Difficulty Filters -->
                    <div class="flex bg-slate-100 p-1 rounded-lg">
                        <button @click="difficultyFilter = 'all'"
                            :class="difficultyFilter === 'all' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                            class="px-3 py-1 text-sm font-medium rounded-md transition-all">All</button>
                        <button @click="difficultyFilter = 'easy'"
                            :class="difficultyFilter === 'easy' ? 'bg-green-100 text-green-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                            class="px-3 py-1 text-sm font-medium rounded-md transition-all">Easy</button>
                        <button @click="difficultyFilter = 'medium'"
                            :class="difficultyFilter === 'medium' ? 'bg-yellow-100 text-yellow-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                            class="px-3 py-1 text-sm font-medium rounded-md transition-all">Medium</button>
                        <button @click="difficultyFilter = 'hard'"
                            :class="difficultyFilter === 'hard' ? 'bg-red-100 text-red-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                            class="px-3 py-1 text-sm font-medium rounded-md transition-all">Hard</button>
                    </div>
                </div>

                <div class="text-slate-500"
                    x-show="searchQuery !== '' || showBookmarksOnly || difficultyFilter !== 'all'" x-transition>
                    Showing <span x-text="filteredKanjis.length"></span> results
                </div>
            </div>
        </div>

        <!-- Quiz Section -->
        <div
            class="relative max-w-2xl mx-auto mb-16 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm text-center">
            <button x-show="quiz.active && currentKanjiObj" @click.prevent.stop="toggleBookmark(currentKanjiObj)"
                class="absolute top-4 right-4 p-2 rounded-full hover:bg-slate-100 transition-colors z-10 group/btn shrink-0 flex items-center justify-center">
                <svg class="w-8 h-8 transition-all duration-300 group-hover/btn:scale-110"
                    :class="currentKanjiObj?.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-200 fill-none stroke-current'"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                </svg>
            </button>
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Mini Quiz</h2>
            <div x-show="!quiz.active">
                <button @click="startQuiz()"
                    class="bg-black text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors">Start
                    Quiz</button>
            </div>
            <div x-show="quiz.active">
                <div class="flex justify-center items-center mb-6 relative">
                    <div class="text-7xl font-sans text-slate-800"
                        x-text="quiz.questions[quiz.currentIndex] ? quiz.questions[quiz.currentIndex].kanji : ''"></div>
                </div>
                <input x-ref="quizInput" type="text" x-model="quiz.answer" @keyup.enter="handleEnter()"
                    :readonly="quiz.message !== ''" placeholder="Type meaning in English..."
                    class="w-full max-w-xs border-2 border-slate-200 px-4 py-3 rounded-xl text-center focus:outline-none focus:border-black mb-4 text-lg read-only:bg-slate-50 read-only:text-slate-500">
                <div class="flex justify-center gap-4">
                    <button @click="handleEnter()"
                        class="bg-black text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors"
                        x-text="quiz.message ? 'Next Question' : 'Submit'"></button>
                </div>
                <div class="mt-6 text-2xl font-bold"
                    :class="quiz.message === 'Correct!' ? 'text-green-500' : 'text-red-500'" x-text="quiz.message">
                </div>
                <div class="mt-2 text-lg text-slate-600 font-medium" x-show="quiz.message">
                    Answer: <span x-text="quiz.questions[quiz.currentIndex]?.answers.join(', ')"></span>
                </div>
            </div>
        </div>

        <!-- Flashcard Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-8">
            <template x-for="kanji in filteredKanjis" :key="kanji.kanji">
                <div class="relative w-full h-80 group perspective-1000" @click="kanji.flipped = !kanji.flipped">
                    <!-- The Card Inner -->
                    <div class="w-full h-full transition-transform duration-700 transform-style-3d cursor-pointer shadow-xl rounded-3xl"
                        :class="kanji.flipped ? 'rotate-y-180' : ''">

                        <!-- Front Face -->
                        <div
                            class="absolute inset-0 w-full h-full backface-hidden card-front bg-white border border-slate-200 rounded-3xl flex flex-col items-center justify-center transition-colors hover:border-black group-hover:shadow-2xl">
                            <!-- Bookmark Star -->
                            <button @click.prevent.stop="toggleBookmark(kanji)"
                                class="absolute top-4 right-4 p-2 rounded-full hover:bg-slate-100 transition-colors z-10 group/btn">
                                <svg class="w-7 h-7 transition-all duration-300 group-hover/btn:scale-110"
                                    :class="kanji.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-200 fill-none stroke-current'"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                            <span
                                class="text-9xl mb-4 font-semibold text-slate-800 drop-shadow-sm transition-transform duration-300 group-hover:scale-110"
                                x-text="kanji.kanji"></span>
                            <span
                                class="text-slate-400 font-bold tracking-widest uppercase text-xs opacity-0 transition-opacity duration-300 group-hover:opacity-100">Click
                                to flip</span>
                        </div>

                        <!-- Back Face -->
                        <div
                            class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-white text-slate-800 rounded-3xl p-6 flex flex-col justify-start items-center text-center shadow-2xl border border-slate-200 overflow-y-auto no-scrollbar">
                            <button @click.prevent.stop="toggleBookmark(kanji)"
                                class="absolute top-4 right-4 p-2 rounded-full hover:bg-slate-100 transition-colors z-10 group/btn shrink-0">
                                <svg class="w-7 h-7 transition-all duration-300 group-hover/btn:scale-110"
                                    :class="kanji.bookmarked ? 'text-yellow-400 fill-yellow-400' : 'text-slate-200 fill-none stroke-current'"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                                </svg>
                            </button>
                            <h3 class="text-3xl font-bold text-black mb-3 mt-2 leading-tight shrink-0"
                                x-text="kanji.meaning"></h3>
                            <div class="flex flex-col gap-1 w-full mb-3 shrink-0">
                                <p class="text-[0.7rem] font-bold text-slate-400 uppercase tracking-widest">Readings</p>
                                <p class="text-sm text-slate-700 font-mono bg-slate-50 py-1.5 px-3 rounded-lg border border-slate-200"
                                    x-text="kanji.reading"></p>
                            </div>
                            <div class="flex flex-col gap-1 w-full mb-3 text-left shrink-0" x-show="kanji.example_ja">
                                <p class="text-[0.7rem] font-bold text-slate-400 uppercase tracking-widest text-center">
                                    Example</p>
                                <div class="bg-blue-50/40 border border-blue-100 p-3 rounded-xl">
                                    <p class="font-bold text-blue-900 text-lg mb-0.5" x-text="kanji.example_ja"></p>
                                    <p class="text-xs text-blue-800/80 mb-1 font-mono" x-text="kanji.example_read"></p>
                                    <p class="text-sm text-slate-600 leading-snug" x-text="kanji.example_en"></p>
                                </div>
                            </div>
                            <div class="relative mt-auto pt-3 border-t border-slate-100 w-full shrink-0">
                                <p class="text-[0.90rem] text-slate-500 italic leading-snug"
                                    x-text="kanji.origin_story"></p>
                            </div>
                        </div>
                    </div>
                </div>
        </div>
        </template>
    </div>

    <!-- Footer -->
    <footer class="mt-24 text-center text-slate-400 text-sm font-medium">
        <p>Built with immense sarcasm, zero build tools, and strictly N5 vocabulary.</p>
    </footer>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('kanjiApp', () => ({
                kanjis: [
                    { kanji: '一', meaning: "One", reading: "ichi, itsu / hito-, hito.tsu", origin_story: "Just a line. The person who invented this gave up immediately.", example_ja: "\u4e00\u65e5", example_read: "tsuitachi / ichinichi", example_en: "First day of the month / One day", difficulty: 'easy' },
                    { kanji: '二', meaning: "Two", reading: "ni, ji / futa, futa.tsu", origin_story: "Two lines. Sequel to the first line, rarely as good.", example_ja: "\u4e8c\u4eba", example_read: "futari", example_en: "Two people", difficulty: 'easy' },
                    { kanji: '三', meaning: "Three", reading: "san / mi, mi.tsu, mit.tsu", origin_story: "Three lines. A trilogy nobody asked for.", example_ja: "\u4e09\u65e5\u6708", example_read: "mikazuki", example_en: "Crescent moon (3rd-day moon)", difficulty: 'easy' },
                    { kanji: '四', meaning: "Four", reading: "shi / yon, yo, yo.tsu, yot.tsu", origin_story: "A box with curtains, hiding from responsibilities.", example_ja: "\u56db\u5b63", example_read: "shiki", example_en: "Four seasons", difficulty: 'easy' },
                    { kanji: '五', meaning: "Five", reading: "go / itsu, itsu.tsu", origin_story: "A precarious stack of shelves about to collapse.", example_ja: "\u4e94\u611f", example_read: "gokan", example_en: "The five senses", difficulty: 'easy' },
                    { kanji: '六', meaning: "Six", reading: "roku, riku / mu, mu.tsu, mut.tsu", origin_story: "A tiny person doing a jumping jack.", example_ja: "\u516d\u672c\u6728", example_read: "Roppongi", example_en: "Roppongi (place name)", difficulty: 'easy' },
                    { kanji: '七', meaning: "Seven", reading: "shichi / nana, nana.tsu", origin_story: "An upside down \"t\". Typography gone wrong.", example_ja: "\u4e03\u5915", example_read: "tanabata", example_en: "Star Festival", difficulty: 'easy' },
                    { kanji: '八', meaning: "Eight", reading: "hachi / ya, ya.tsu, yat.tsu, you", origin_story: "A mustache floating in the void.", example_ja: "\u516b\u767e\u5c4b", example_read: "yaoya", example_en: "Greengrocer", difficulty: 'easy' },
                    { kanji: '九', meaning: "Nine", reading: "kyuu, ku / kokono, kokono.tsu", origin_story: "A person doing a very dramatic lunge.", example_ja: "\u4e5d\u5dde", example_read: "Kyuushuu", example_en: "Kyushu (island)", difficulty: 'easy' },
                    { kanji: '十', meaning: "Ten", reading: "juu, ji, to, too", origin_story: "A cross. Rest in peace to your free time trying to learn all these.", example_ja: "\u5341\u5206", example_read: "juubun", example_en: "Enough / Sufficient", difficulty: 'easy' },
                    { kanji: '百', meaning: "Hundred", reading: "hyaku, byaku / momo", origin_story: "The number one squishing a white bug (\u767d) until it pops.", example_ja: "\u767e\u8ca8\u5e97", example_read: "hyakkaten", example_en: "Department store", difficulty: 'easy' },
                    { kanji: '千', meaning: "Thousand", reading: "sen / chi", origin_story: "A cross with a fancy hat.", example_ja: "\u5343\u8449", example_read: "Chiba", example_en: "Chiba (prefecture, lit. Thousand leaves)", difficulty: 'easy' },
                    { kanji: '万', meaning: "Ten Thousand, Many", reading: "man, ban / yorozu", origin_story: "A swastika that realized its mistake mid-draw and tried to change shape.", example_ja: "\u4e07\u6b73", example_read: "banzai", example_en: "Hurrah / Long life", difficulty: 'easy' },
                    { kanji: '円', meaning: "Yen, Circle, Round", reading: "en / maru.i", origin_story: "A window with bars. Your money is trapped.", example_ja: "\u5186\u6ed1", example_read: "enkatsu", example_en: "Smooth / Unhindered", difficulty: 'easy' },
                    { kanji: '日', meaning: "Sun, Day, Japan", reading: "nichi, jitsu / hi, -bi, -ka", origin_story: "A window with closed blinds so you can rot in bed without guilt.", example_ja: "\u65e5\u66dc\u65e5", example_read: "nichiyoubi", example_en: "Sunday", difficulty: 'easy' },
                    { kanji: '月', meaning: "Moon, Month", reading: "getsu, gatsu / tsuki", origin_story: "A ladder to nowhere, much like your crypto portfolio.", example_ja: "\u4eca\u6708", example_read: "kongetsu", example_en: "This month", difficulty: 'easy' },
                    { kanji: '火', meaning: "Fire", reading: "ka / hi, -bi, ho-", origin_story: "A person waving their arms while burning alive. Relatable Monday energy.", example_ja: "\u82b1\u706b", example_read: "hanabi", example_en: "Fireworks", difficulty: 'easy' },
                    { kanji: '水', meaning: "Water", reading: "sui / mizu", origin_story: "A splash caused by throwing your life savings into a fountain.", example_ja: "\u6c34\u661f", example_read: "suisei", example_en: "Mercury (planet)", difficulty: 'easy' },
                    { kanji: '木', meaning: "Tree, Wood", reading: "boku, moku / ki, ko-", origin_story: "A plus sign that grew roots. Mathematical botany.", example_ja: "\u6728\u6f0f\u308c\u65e5", example_read: "komorebi", example_en: "Sunlight filtering through trees", difficulty: 'easy' },
                    { kanji: '金', meaning: "Gold, Money, Metal", reading: "kin, kon, gon / kane, kana-", origin_story: "An umbrella covering a pile of dirt. Peak luxury.", example_ja: "\u304a\u91d1\u6301\u3061", example_read: "okanemochi", example_en: "Rich person", difficulty: 'easy' },
                    { kanji: '土', meaning: "Earth, Soil, Ground", reading: "do, to / tsuchi", origin_story: "A cross on the ground marking where your hopes and dreams lie.", example_ja: "\u304a\u571f\u7523", example_read: "omiyage", example_en: "Souvenir", difficulty: 'easy' },
                    { kanji: '山', meaning: "Mountain", reading: "san, zan / yama", origin_story: "Just an upside-down pitchfork that got stuck in the ground.", example_ja: "\u5bcc\u58eb\u5c71", example_read: "Fujisan", example_en: "Mount Fuji", difficulty: 'easy' },
                    { kanji: '川', meaning: "River, Stream", reading: "sen / kawa", origin_story: "Three lines drawn by someone too lazy to draw actual water.", example_ja: "\u5929\u306e\u5ddd", example_read: "amanogawa", example_en: "The Milky Way", difficulty: 'easy' },
                    { kanji: '人', meaning: "Person, Human", reading: "jin, nin / hito", origin_story: "A person slouching because they are tired of paying taxes.", example_ja: "\u4eba\u9593", example_read: "ningen", example_en: "Human being", difficulty: 'easy' },
                    { kanji: '男', meaning: "Man, Male", reading: "dan, nan / otoko", origin_story: "A field (\u7530) with power (\u529b). Agrarian patriarchy at its finest.", example_ja: "\u7537\u306e\u5b50", example_read: "otokonoko", example_en: "Boy", difficulty: 'easy' },
                    { kanji: '女', meaning: "Woman, Female", reading: "jo, nyo, nyou / onna, me", origin_story: "Someone aggressively crossing their legs in a cramped subway seat.", example_ja: "\u5973\u795e", example_read: "megami", example_en: "Goddess", difficulty: 'easy' },
                    { kanji: '子', meaning: "Child, Offspring", reading: "shi, su, tsu / ko, -ko", origin_story: "A kid with a massive head and arms outstretched asking for your iPad.", example_ja: "\u8ff7\u5b50", example_read: "maigo", example_en: "Lost child", difficulty: 'easy' },
                    { kanji: '目', meaning: "Eye, Vision", reading: "moku, boku / me, -me, ma-", origin_story: "A bookshelf with exactly two shelves. Clearly, literacy is not a priority.", example_ja: "\u76ee\u7684", example_read: "mokuteki", example_en: "Purpose / Goal", difficulty: 'easy' },
                    { kanji: '耳', meaning: "Ear, Hearing", reading: "ji / mimi", origin_story: "A ladder with too many rungs that goes straight into your brain.", example_ja: "\u8033\u6253\u3061", example_read: "mimiuchi", example_en: "Whispering in ear", difficulty: 'easy' },
                    { kanji: '口', meaning: "Mouth, Entrance", reading: "kou, ku / kuchi", origin_story: "It", example_ja: "\u975e\u5e38\u53e3", example_read: "hijouguchi", example_en: "Emergency exit", difficulty: 'easy' },
                    { kanji: '手', meaning: "Hand, Skill", reading: "shu, zu / te, -te, ta-", origin_story: "A weird mutated rake missing a prong.", example_ja: "\u82e6\u624b", example_read: "nigate", example_en: "Weak at / Dislike", difficulty: 'easy' },
                    { kanji: '足', meaning: "Foot, Leg, Sufficient", reading: "soku / ashi, ta.riru, ta.su", origin_story: "A TV set with a bizarre antenna and a kickstand.", example_ja: "\u6e80\u8db3", example_read: "manzoku", example_en: "Satisfaction", difficulty: 'easy' },

                        filtered = filtered.filter(k => k.difficulty === this.difficultyFilter);
                    }

                    if (this.showBookmarksOnly) {
                        filtered = filtered.filter(k => k.bookmarked);
                    }

                    if (this.searchQuery !== '') {
                        const query = this.searchQuery.toLowerCase();
                        filtered = filtered.filter(k =>
                            k.kanji.toLowerCase().includes(query) ||
                            k.meaning.toLowerCase().includes(query) ||
                            k.reading.toLowerCase().includes(query)
                        );
                    }

                    return filtered;
                }
            }))
        })
    </script>
</body>
